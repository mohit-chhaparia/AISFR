name: Global Daily Radar - For Nation List 1

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-tier1-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  setup-matrix:
    runs-on: [self-hosted, radar-fallback]
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          NATIONS=$(jq -c '.["Tier 1"] | [.[].id]' nation_config.json)
          echo "matrix=$NATIONS" >> "$GITHUB_OUTPUT"

  github-probe:
    needs: setup-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    outputs:
      github_available: ${{ steps.probe.outputs.github_available }}
    steps:
      - id: probe
        name: Probe GitHub-hosted availability
        run: echo "GitHub-hosted runner is available."

  run-radars-github:
    needs: [setup-matrix, github-probe]
    if: ${{ always() && needs.github-probe.outputs.github_available == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        nation: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install modern dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install --disable-pip-version-check google-genai requests

      - name: Create data directory
        run: mkdir -p data

      - name: Run Automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automation.py --nation "${{ matrix.nation }}" --list "Tier 1" --model "gemini-2.5-flash" --attempts 1

      - name: Save Records
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "Radar-Bot"
          git config --global user.email "bot@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git add .
          git commit -m "Update history: ${{ matrix.nation }}" || echo "No changes"

          for i in {1..5}; do
            git pull origin main --rebase && git push origin main && break
            sleep 5
          done

  run-radars-self-hosted:
    needs: [setup-matrix, github-probe]
    if: ${{ always() && needs.github-probe.outputs.github_available != 'true' }}
    runs-on: [self-hosted, radar-fallback]
    timeout-minutes: 240
    strategy:
      matrix:
        nation: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 1

    steps:
      - uses: actions/checkout@v4

      - name: Locate local Python 3.11
        shell: bash
        run: |
          set -euo pipefail

          if command -v brew >/dev/null 2>&1; then
            PY_PREFIX="$(brew --prefix python@3.11 2>/dev/null || true)"
            if [[ -n "$PY_PREFIX" && -x "$PY_PREFIX/bin/python3.11" ]]; then
              echo "$PY_PREFIX/bin" >> "$GITHUB_PATH"
            fi
          fi

          if command -v python3.11 >/dev/null 2>&1; then
            echo "Using $(command -v python3.11)"
            python3.11 --version
            exit 0
          fi

          echo "Python 3.11 not found on self-hosted Mac."
          echo "Install it first with: brew install python@3.11"
          exit 1

      - name: Install modern dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install --disable-pip-version-check google-genai requests

      - name: Create data directory
        run: mkdir -p data

      - name: Run Automation (low priority on Mac fallback)
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          nice -n 10 python3.11 automation.py --nation "${{ matrix.nation }}" --list "Tier 1" --model "gemini-2.5-flash" --attempts 1

      - name: Save Records
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "Radar-Bot"
          git config --global user.email "bot@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git add .
          git commit -m "Update history: ${{ matrix.nation }}" || echo "No changes"

          for i in {1..5}; do
            git pull origin main --rebase && git push origin main && break
            sleep 5
          done
